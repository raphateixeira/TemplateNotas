# ---------------------------------------------------------------------
#  Renderiza o site Quarto e publica em GitHub Pages (branch gh-pages)
#  a cada push em main. Após o primeiro run, ative em:
#  Settings > Pages > Source > Deploy from branch > gh-pages.
# ---------------------------------------------------------------------
name: Publicar site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2

      - name: Instalar dependência de sistema (ImageMagick, para o pacote R magick)
        run: sudo apt-get update && sudo apt-get install -y libmagick++-dev

      - name: Instalar pacotes R (magick para PDF→PNG dos diagramas TikZ; knitr/rmarkdown exigidos pelo engine de chunks R do Quarto)
        run: install.packages(c("magick", "knitr", "rmarkdown"))
        shell: Rscript {0}

      - name: Configurar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar TinyTeX (LaTeX para os diagramas TikZ)
        run: quarto install tinytex --update-path

      - name: Renderizar e publicar
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
